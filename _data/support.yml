# Transparency board data for /support — edit this file to update the page.
#
# HOW IT WORKS
#   - month:                  the current month label shown on the board.
#   - monthly_total_display:  what you raised this month, as a string (you set it).
#   - supporters_count:       how many supporters this month.
#   - show_recent:            max number of names to show (the rest are never listed).
#   - recent:                 supporters, most-recent FIRST. Only entries with
#                             `public: true` are shown; the page shows at most
#                             `show_recent` of them and never a full/scrolling list.
#                             People who opt out (public: false) are counted but
#                             not named. Roll old entries off each month.
#
# NOTE: these are figures YOU maintain (or wire a Stripe sync to regenerate).
# Seeded empty on purpose — no fabricated numbers.

month: "July 2026"
monthly_total_display: "$0"
supporters_count: 0
show_recent: 12

recent: []
#   - name: "Ada L."      # public display name (their choice)
#     public: true
#     tier: "Supporter"
#   - name: ""            # opted out — counted, not named
#     public: false
