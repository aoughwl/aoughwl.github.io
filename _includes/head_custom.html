<!-- favicon (aoughwl mark) — site served at root, so an absolute path works
     for every docs page and the standalone playground alike -->
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="shortcut icon" href="/favicon.ico">

<!-- webfonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<!-- apply saved theme before paint (no flash); dark is default -->
<script>
  (function () {
    try {
      var t = localStorage.getItem('aoughwl-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>

<!-- inject the light/dark toggle -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var btn = document.createElement('button');
    btn.id = 'theme-toggle';
    btn.type = 'button';
    btn.setAttribute('aria-label', 'Toggle light and dark theme');
    function render() {
      var dark = document.documentElement.getAttribute('data-theme') === 'dark';
      btn.textContent = dark ? '☀' : '☾';   /* ☀ in dark (→light), ☾ in light (→dark) */
      btn.title = dark ? 'Switch to light' : 'Switch to dark';
    }
    btn.addEventListener('click', function () {
      var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('aoughwl-theme', next); } catch (e) {}
      render();
    });
    document.body.appendChild(btn);
    render();
  });
</script>

<!-- site-wide "docs may be stale" notice (Option E). Dismissal is keyed to the
     snapshot date, so bumping DATE below re-shows it for everyone. -->
<style>
  .aoughwl-notice {
    position: relative;
    margin: 0 0 1.75rem;
    padding: 0.95rem 2.6rem 0.95rem 1.1rem;
    border: 1px solid rgba(125, 150, 255, 0.55);
    border-left: 4px solid #7d96ff;
    border-radius: 6px;
    background: rgba(125, 150, 255, 0.22);
    box-shadow: 0 1px 10px rgba(125, 150, 255, 0.12);
    font-size: 0.9rem;
    line-height: 1.55;
  }
  html[data-theme="light"] .aoughwl-notice {
    background: rgba(125, 150, 255, 0.14);
  }
  .aoughwl-notice strong { font-weight: 600; }
  /* red variant — the always-on AI-generated disclosure, stacked above the blue notice */
  .aoughwl-notice--ai {
    border-color: rgba(255, 96, 96, 0.6);
    border-left-color: #ff6060;
    background: rgba(255, 96, 96, 0.20);
    box-shadow: 0 1px 10px rgba(255, 96, 96, 0.12);
  }
  html[data-theme="light"] .aoughwl-notice--ai {
    background: rgba(255, 96, 96, 0.12);
  }
  .aoughwl-notice .aoughwl-notice-x {
    position: absolute;
    top: 0.5rem;
    right: 0.6rem;
    border: 0;
    background: transparent;
    color: inherit;
    opacity: 0.55;
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0.2rem;
  }
  .aoughwl-notice .aoughwl-notice-x:hover { opacity: 1; }

  /* ---- supporter CTA (sidebar footer) ---- */
  .site-footer-supporter {
    display: flex; align-items: center; gap: 0.5rem;
    margin: 0 0 0.6rem; padding: 0.55rem 0.7rem; border-radius: 7px;
    background: linear-gradient(180deg, #7d96ff, #6478f0);
    color: #0b0d16 !important; font-weight: 600; font-size: 0.82rem;
    text-decoration: none !important;
    box-shadow: 0 1px 10px rgba(125, 150, 255, 0.35);
  }
  .site-footer-supporter:hover { filter: brightness(1.07); }
  .site-footer-supporter .supporter-ico { flex: 0 0 auto; }

  /* ---- /support page ---- */
  .support-btn {
    display: inline-block; margin: 0.3rem 0 0.2rem; padding: 0.7rem 1.15rem;
    border-radius: 8px; background: linear-gradient(180deg, #7d96ff, #6478f0);
    color: #0b0d16 !important; font-weight: 600; font-size: 1.02rem;
    text-decoration: none !important;
    box-shadow: 0 2px 14px rgba(125, 150, 255, 0.3);
  }
  .support-btn:hover { filter: brightness(1.07); }
  .support-btn--soon {
    background: none; color: inherit !important; box-shadow: none; opacity: 0.8;
    border: 1px dashed rgba(125, 150, 255, 0.55); cursor: default;
  }
  .support-board { display: flex; flex-wrap: wrap; gap: 1rem; margin: 1rem 0 1.25rem; }
  .support-stat {
    flex: 1 1 160px; min-width: 140px; padding: 1rem 1.1rem; text-align: center;
    border: 1px solid rgba(125, 150, 255, 0.35); border-radius: 8px;
    background: rgba(125, 150, 255, 0.10);
  }
  .support-stat-num { display: block; font-size: 1.9rem; font-weight: 700; line-height: 1.1; }
  .support-stat-label { display: block; margin-top: 0.25rem; font-size: 0.82rem; opacity: 0.8; }
  .support-recent-label { font-weight: 600; margin-bottom: 0.35rem; }
  .support-recent {
    list-style: none; margin: 0 0 0.5rem; padding: 0;
    display: flex; flex-wrap: wrap; gap: 0.4rem 0.5rem;
  }
  .support-recent li {
    display: inline-flex; align-items: center; gap: 0.4rem;
    border: 1px solid rgba(125, 150, 255, 0.35); border-radius: 999px;
    padding: 0.2rem 0.7rem; font-size: 0.85rem;
  }
  .support-tier { font-size: 0.72rem; opacity: 0.7; }
  .support-recent-note, .support-recent-empty { font-size: 0.85rem; opacity: 0.8; }
</style>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var DATE = 'July 14, 2026';
    var KEY = 'aoughwl-stale-notice-dismissed:' + DATE;
    try { if (localStorage.getItem(KEY)) return; } catch (e) {}

    var el = document.createElement('div');
    el.className = 'aoughwl-notice';
    el.setAttribute('role', 'note');
    el.innerHTML =
      '<strong>A quick note.</strong> What you’re reading is a manual ' +
      'snapshot (' + DATE + ') and won’t always match the latest code. ' +
      'We’re building something better — docs that stay correct on ' +
      'their own, generated by aoughwl. We can’t wait to show you what ' +
      'that means.' +
      '<button class="aoughwl-notice-x" type="button" aria-label="Dismiss">×</button>';

    el.querySelector('.aoughwl-notice-x').addEventListener('click', function () {
      try { localStorage.setItem(KEY, '1'); } catch (e) {}
      el.remove();
    });

    /* Prepend to the just-the-docs content column; fall back to <body>. */
    var host = document.querySelector('.main-content-wrap') ||
               document.querySelector('#main-content') ||
               document.querySelector('.main-content') ||
               document.body;
    host.insertBefore(el, host.firstChild);
  });
</script>

<!-- always-on AI-generated disclosure (red), rendered ABOVE the blue stale notice.
     Runs after the blue script so it inserts last and lands on top. Not
     dismissable — the disclosure should always be visible. -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var KEY = 'aoughwl-ai-notice-dismissed:v1';
    try { if (localStorage.getItem(KEY)) return; } catch (e) {}

    var el = document.createElement('div');
    el.className = 'aoughwl-notice aoughwl-notice--ai';
    el.setAttribute('role', 'note');
    el.innerHTML =
      '<strong>Everything here is AI-generated</strong> — but tested against real ' +
      'code. Spot something off? We gladly take ' +
      '<a href="https://github.com/aoughwl/aoughwl.github.io/issues">issues on GitHub</a>.' +
      '<button class="aoughwl-notice-x" type="button" aria-label="Dismiss">×</button>';

    el.querySelector('.aoughwl-notice-x').addEventListener('click', function () {
      try { localStorage.setItem(KEY, '1'); } catch (e) {}
      el.remove();
    });

    var host = document.querySelector('.main-content-wrap') ||
               document.querySelector('#main-content') ||
               document.querySelector('.main-content') ||
               document.body;
    host.insertBefore(el, host.firstChild);
  });
</script>

<!-- mobile: a floating "open navigation" button that appears once you scroll
     past the top header, so the menu (and Home) stays one tap away. It just
     proxies just-the-docs' own #menu-button, so open/close state stays in sync. -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var menuButton = document.getElementById('menu-button');
    if (!menuButton) return;                       /* desktop layouts may omit it */
    var header = menuButton.closest('.site-header') ||
                 document.querySelector('.site-header');

    var fab = document.createElement('button');
    fab.id = 'nav-fab';
    fab.type = 'button';
    fab.setAttribute('aria-label', 'Open navigation menu');
    fab.innerHTML =
      '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" ' +
      'stroke="currentColor" stroke-width="2" stroke-linecap="round" ' +
      'aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"/></svg>';
    fab.addEventListener('click', function () { menuButton.click(); });
    document.body.appendChild(fab);

    /* Show the fab whenever the header has scrolled out of view and the nav is
       closed. An IntersectionObserver works no matter which element actually
       scrolls on mobile (window vs. an inner container); the CSS media query
       keeps it off the desktop layout entirely. */
    var headerVisible = true;
    function apply() {
      var navOpen = menuButton.classList.contains('nav-open');
      fab.classList.toggle('show', !headerVisible && !navOpen);
    }
    if (header && 'IntersectionObserver' in window) {
      new IntersectionObserver(function (entries) {
        headerVisible = entries[0].isIntersecting;
        apply();
      }, { threshold: 0 }).observe(header);
    }
    /* keep in sync when the nav is opened/closed */
    menuButton.addEventListener('click', function () { setTimeout(apply, 30); });
    apply();
  });
</script>
