<!-- apply saved theme before paint (no flash); dark is default -->
<script>
  (function () {
    try {
      var t = localStorage.getItem('aoughwl-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>

<!-- inject the light/dark toggle -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var btn = document.createElement('button');
    btn.id = 'theme-toggle';
    btn.type = 'button';
    btn.setAttribute('aria-label', 'Toggle light and dark theme');
    function render() {
      var dark = document.documentElement.getAttribute('data-theme') === 'dark';
      btn.textContent = dark ? '☀' : '☾';   /* ☀ in dark (→light), ☾ in light (→dark) */
      btn.title = dark ? 'Switch to light' : 'Switch to dark';
    }
    btn.addEventListener('click', function () {
      var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('aoughwl-theme', next); } catch (e) {}
      render();
    });
    document.body.appendChild(btn);
    render();
  });
</script>

<!-- site-wide "docs may be stale" notice (Option E). Dismissal is keyed to the
     snapshot date, so bumping DATE below re-shows it for everyone. -->
<style>
  .aoughwl-notice {
    position: relative;
    margin: 0 0 1.75rem;
    padding: 0.95rem 2.6rem 0.95rem 1.1rem;
    border: 1px solid rgba(125, 150, 255, 0.55);
    border-left: 4px solid #7d96ff;
    border-radius: 6px;
    background: rgba(125, 150, 255, 0.22);
    box-shadow: 0 1px 10px rgba(125, 150, 255, 0.12);
    font-size: 0.9rem;
    line-height: 1.55;
  }
  html[data-theme="light"] .aoughwl-notice {
    background: rgba(125, 150, 255, 0.14);
  }
  .aoughwl-notice strong { font-weight: 600; }
  /* red variant — the always-on AI-generated disclosure, stacked above the blue notice */
  .aoughwl-notice--ai {
    border-color: rgba(255, 96, 96, 0.6);
    border-left-color: #ff6060;
    background: rgba(255, 96, 96, 0.20);
    box-shadow: 0 1px 10px rgba(255, 96, 96, 0.12);
  }
  html[data-theme="light"] .aoughwl-notice--ai {
    background: rgba(255, 96, 96, 0.12);
  }
  .aoughwl-notice .aoughwl-notice-x {
    position: absolute;
    top: 0.5rem;
    right: 0.6rem;
    border: 0;
    background: transparent;
    color: inherit;
    opacity: 0.55;
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0.2rem;
  }
  .aoughwl-notice .aoughwl-notice-x:hover { opacity: 1; }

  /* ---- sidebar footer links (centered): Supporter on top (larger), Discord under (smaller) ---- */
  .site-footer-supporter,
  .site-footer-discord {
    display: flex; justify-content: center; align-items: center; gap: 0.45rem;
    text-align: center; color: inherit; text-decoration: none !important;
  }
  .site-footer-supporter { font-size: 0.98rem; font-weight: 600; opacity: 0.95; margin: 0.5rem 0 0.15rem; }
  .site-footer-supporter:hover { opacity: 1; }
  .site-footer-discord { font-size: 0.78rem; font-weight: 400; opacity: 0.68; margin: 0 0 0.35rem; }
  .site-footer-discord:hover { opacity: 0.95; }
  .site-footer-supporter .supporter-ico,
  .site-footer-discord .discord-ico { flex: 0 0 auto; }
  .site-footer-supporter .supporter-ico { scale: 1.5; margin-bottom: 6px; }

  /* ---- /support page ---- */
  .support-btn {
    display: inline-block; margin: 0.3rem 0 0.2rem; padding: 0.7rem 1.15rem;
    border-radius: 8px; background: linear-gradient(180deg, #7d96ff, #6478f0);
    color: #0b0d16 !important; font-weight: 600; font-size: 1.02rem;
    text-decoration: none !important;
    box-shadow: 0 2px 14px rgba(125, 150, 255, 0.3);
  }
  .support-btn:hover { filter: brightness(1.07); }
  .support-btn--soon {
    background: none; color: inherit !important; box-shadow: none; opacity: 0.8;
    border: 1px dashed rgba(125, 150, 255, 0.55); cursor: default;
  }
  .support-amounts { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.6rem 0 0.2rem; }
  .support-amount {
    display: inline-block; padding: 0.5rem 0.95rem; border-radius: 8px;
    border: 1px solid rgba(125, 150, 255, 0.55);
    background: rgba(125, 150, 255, 0.10);
    color: inherit !important; font-weight: 600; text-decoration: none !important;
  }
  .support-amount:hover { background: rgba(125, 150, 255, 0.22); }
  .support-board { display: flex; flex-wrap: wrap; gap: 1rem; margin: 1rem 0 1.25rem; }
  .support-stat {
    flex: 1 1 160px; min-width: 140px; padding: 1rem 1.1rem; text-align: center;
    border: 1px solid rgba(125, 150, 255, 0.35); border-radius: 8px;
    background: rgba(125, 150, 255, 0.10);
  }
  .support-stat-num { display: block; font-size: 1.9rem; font-weight: 700; line-height: 1.1; }
  .support-stat-label { display: block; margin-top: 0.25rem; font-size: 0.82rem; opacity: 0.8; }
  .support-recent-label { font-weight: 600; margin-bottom: 0.35rem; }
  .support-recent {
    list-style: none; margin: 0 0 0.5rem; padding: 0;
    display: flex; flex-wrap: wrap; gap: 0.4rem 0.5rem;
  }
  .support-recent li {
    display: inline-flex; align-items: center; gap: 0.4rem;
    border: 1px solid rgba(125, 150, 255, 0.35); border-radius: 999px;
    padding: 0.2rem 0.7rem; font-size: 0.85rem;
  }
  .support-tier { font-size: 0.72rem; opacity: 0.7; }
  .support-recent-note, .support-recent-empty { font-size: 0.85rem; opacity: 0.8; }

  /* ---- sidebar nav: make the nesting levels legible (they were blending) ---- */
  /* top-level groups: bolder, a little breathing room between them */
  .site-nav > .nav-list > .nav-list-item > .nav-list-link {
    font-weight: 600 !important;
    font-size: 0.93rem;
  }
  .site-nav > .nav-list > .nav-list-item { margin-top: 0.1rem; }

  /* every nested level gets a vertical guide-rail + step-in, and gets lighter */
  .site-nav .nav-list .nav-list {
    margin-left: 0.72rem;
    padding-left: 0.15rem;
    border-left: 1px solid rgba(125, 150, 255, 0.28);
  }
  .site-nav .nav-list .nav-list .nav-list-link {
    font-weight: 400 !important;
    opacity: 0.9;
  }
  /* third level (sub-sub): smaller, dimmer, fainter rail */
  .site-nav .nav-list .nav-list .nav-list { border-left-color: rgba(125, 150, 255, 0.16); }
  .site-nav .nav-list .nav-list .nav-list .nav-list-link {
    font-size: 0.82rem;
    opacity: 0.74;
  }

  /* active item: unmistakable accent (inset bar so layout doesn't shift) */
  .site-nav .nav-list-link.active {
    font-weight: 600 !important;
    color: #b7c1ff !important;
    box-shadow: inset 2px 0 0 #7d96ff;
  }
  /* the collapse chevron: a touch more visible so groups read as groups */
  .site-nav .nav-list-expander svg { opacity: 0.8; }

  /* per-item repo link: label left, repo pushed RIGHT (no dash) + external icon — injected by JS */
  .site-nav .nav-list-item.has-nav-repo { display: flex; align-items: baseline; }
  .site-nav .has-nav-repo > .nav-list-link { flex: 1 1 auto; min-width: 0; }
  .nav-repo {
    flex: 0 0 auto; margin-left: auto; padding-right: 0.55rem;
    display: inline-flex; align-items: center; gap: 0.25rem;
    font-size: 0.72rem; opacity: 0.55; color: inherit;
    text-decoration: none !important; white-space: nowrap;
  }
  .nav-repo:hover { opacity: 0.95; }
  .nav-repo svg { width: 11px; height: 11px; flex: 0 0 auto; }
  /* breathing room between nav items */
  .site-nav .nav-list .nav-list-item { margin: 0.22rem 0; }
  /* split items have TWO <a> children — highlight the whole row, not just the label */
  .site-nav .nav-list-item.has-nav-repo:hover { background: var(--bg-elev-2); }
  .site-nav .has-nav-repo:hover > .nav-list-link { color: var(--text); }
  .site-nav .has-nav-repo:hover .nav-repo { opacity: 0.9; }
</style>

<!-- split each "Label — reponame" nav item into: label (-> doc page) + a
     right-aligned repo link with an external icon (-> github.com/aoughwl/reponame).
     Leaf items only, so collapsible groups keep their chevron. -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var EXT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
      'stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
      '<path d="M14 4h6v6"/><path d="M20 4l-9 9"/>' +
      '<path d="M17 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1h5"/></svg>';
    document.querySelectorAll('.site-nav .nav-list-item').forEach(function (li) {
      if (li.querySelector(':scope > .nav-list')) return;               /* group -> keep whole */
      var link = li.querySelector(':scope > .nav-list-link');
      if (!link) return;
      var m = link.textContent.trim().match(/^(.*\S)\s+[—–-]\s+([A-Za-z0-9._-]+)$/);
      if (!m) return;
      link.textContent = m[1];
      var a = document.createElement('a');
      a.className = 'nav-repo';
      a.href = 'https://github.com/aoughwl/' + m[2];
      a.target = '_blank'; a.rel = 'noopener';
      a.title = 'aoughwl/' + m[2] + ' on GitHub';
      a.innerHTML = '<span>' + m[2] + '</span>' + EXT;
      li.appendChild(a);
      li.classList.add('has-nav-repo');
    });
  });
</script>
<!-- AI-generated disclosure (red), shown at the top of the content. Dismissable. -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var KEY = 'aoughwl-ai-notice-dismissed:v1';
    try { if (localStorage.getItem(KEY)) return; } catch (e) {}

    var el = document.createElement('div');
    el.className = 'aoughwl-notice aoughwl-notice--ai';
    el.setAttribute('role', 'note');
    el.innerHTML =
      '<strong>Everything here is AI-generated</strong> — but tested against real ' +
      'code. Spot something off? We gladly take ' +
      '<a href="https://github.com/aoughwl/aoughwl.github.io/issues">issues on GitHub</a>.' +
      '<button class="aoughwl-notice-x" type="button" aria-label="Dismiss">×</button>';

    el.querySelector('.aoughwl-notice-x').addEventListener('click', function () {
      try { localStorage.setItem(KEY, '1'); } catch (e) {}
      el.remove();
    });

    var host = document.querySelector('.main-content-wrap') ||
               document.querySelector('#main-content') ||
               document.querySelector('.main-content') ||
               document.body;
    host.insertBefore(el, host.firstChild);
  });
</script>

<!-- mobile: a floating "open navigation" button that appears once you scroll
     past the top header, so the menu (and Home) stays one tap away. It just
     proxies just-the-docs' own #menu-button, so open/close state stays in sync. -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var menuButton = document.getElementById('menu-button');
    if (!menuButton) return;                       /* desktop layouts may omit it */
    var header = menuButton.closest('.site-header') ||
                 document.querySelector('.site-header');

    var fab = document.createElement('button');
    fab.id = 'nav-fab';
    fab.type = 'button';
    fab.setAttribute('aria-label', 'Open navigation menu');
    fab.innerHTML =
      '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" ' +
      'stroke="currentColor" stroke-width="2" stroke-linecap="round" ' +
      'aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"/></svg>';
    fab.addEventListener('click', function () { menuButton.click(); });
    document.body.appendChild(fab);

    /* Show the fab whenever the header has scrolled out of view and the nav is
       closed. An IntersectionObserver works no matter which element actually
       scrolls on mobile (window vs. an inner container); the CSS media query
       keeps it off the desktop layout entirely. */
    var headerVisible = true;
    function apply() {
      var navOpen = menuButton.classList.contains('nav-open');
      fab.classList.toggle('show', !headerVisible && !navOpen);
    }
    if (header && 'IntersectionObserver' in window) {
      new IntersectionObserver(function (entries) {
        headerVisible = entries[0].isIntersecting;
        apply();
      }, { threshold: 0 }).observe(header);
    }
    /* keep in sync when the nav is opened/closed */
    menuButton.addEventListener('click', function () { setTimeout(apply, 30); });
    apply();
  });
</script>
