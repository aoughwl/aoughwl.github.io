<!-- favicon (aoughwl mark) — site served at root, so an absolute path works
     for every docs page and the standalone playground alike -->
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="shortcut icon" href="/favicon.ico">

<!-- CRITICAL, first thing painted: set the page background (and a matching text
     colour) from the theme BEFORE the main stylesheet loads, on BOTH html and
     body, so a full-page navigation paints dark immediately instead of flashing an
     unstyled white frame. The theme script below runs synchronously, so
     [data-theme] is already resolved by first paint.
     (NB: no @view-transition — a cross-document transition here snapshotted the
     unstyled white frame and made the flash worse, not better.) -->
<style>
  html, body { background: #0a0a0b; color: #ededf0; }
  html[data-theme="light"], html[data-theme="light"] body { background: #ffffff; color: #0a0a0b; }
</style>

<!-- webfonts — display=optional (not swap): once the fonts are cached (after the
     first page), every later navigation renders straight in the real font with NO
     fallback→webfont swap flash. preload the stylesheet so it's fetched at highest
     priority on the first visit too. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style"
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=optional">
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=optional">

<!-- apply saved theme before paint (no flash); dark is default -->
<script>
  (function () {
    try {
      var t = localStorage.getItem('aoughwl-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>

<!-- inject the light/dark toggle -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var btn = document.createElement('button');
    btn.id = 'theme-toggle';
    btn.type = 'button';
    btn.setAttribute('aria-label', 'Toggle light and dark theme');
    function render() {
      var dark = document.documentElement.getAttribute('data-theme') === 'dark';
      btn.textContent = dark ? '☀' : '☾';   /* ☀ in dark (→light), ☾ in light (→dark) */
      btn.title = dark ? 'Switch to light' : 'Switch to dark';
    }
    btn.addEventListener('click', function () {
      var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('aoughwl-theme', next); } catch (e) {}
      render();
    });
    document.body.appendChild(btn);
    render();
  });
</script>

<!-- site-wide "docs may be stale" notice (Option E). Dismissal is keyed to the
     snapshot date, so bumping DATE below re-shows it for everyone. -->
<style>
  .aoughwl-notice {
    position: relative;
    margin: 0 0 1.75rem;
    padding: 0.95rem 2.6rem 0.95rem 1.1rem;
    border: 1px solid rgba(125, 150, 255, 0.55);
    border-left: 4px solid #7d96ff;
    border-radius: 6px;
    background: rgba(125, 150, 255, 0.22);
    box-shadow: 0 1px 10px rgba(125, 150, 255, 0.12);
    font-size: 0.9rem;
    line-height: 1.55;
  }
  html[data-theme="light"] .aoughwl-notice {
    background: rgba(125, 150, 255, 0.14);
  }
  .aoughwl-notice strong { font-weight: 600; }
  /* red variant — the always-on AI-generated disclosure, stacked above the blue notice */
  .aoughwl-notice--ai {
    border-color: rgba(255, 96, 96, 0.6);
    border-left-color: #ff6060;
    background: rgba(255, 96, 96, 0.20);
    box-shadow: 0 1px 10px rgba(255, 96, 96, 0.12);
  }
  html[data-theme="light"] .aoughwl-notice--ai {
    background: rgba(255, 96, 96, 0.12);
  }
  .aoughwl-notice .aoughwl-notice-x {
    position: absolute;
    top: 0.5rem;
    right: 0.6rem;
    border: 0;
    background: transparent;
    color: inherit;
    opacity: 0.55;
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0.2rem;
  }
  .aoughwl-notice .aoughwl-notice-x:hover { opacity: 1; }

  /* ---- sidebar footer links (centered): Supporter on top (larger), Discord under (smaller) ---- */
  .site-footer-supporter,
  .site-footer-discord {
    display: flex; justify-content: center; align-items: center; gap: 0.45rem;
    text-align: center; color: inherit; text-decoration: none !important;
  }
  .site-footer-supporter { font-size: 0.98rem; font-weight: 600; opacity: 0.95; margin: 0.5rem 0 0.15rem; }
  .site-footer-supporter:hover { opacity: 1; }
  .site-footer-discord { font-size: 0.78rem; font-weight: 400; opacity: 0.68; margin: 0 0 0.35rem; }
  .site-footer-discord:hover { opacity: 0.95; }
  .site-footer-supporter .supporter-ico,
  .site-footer-discord .discord-ico { flex: 0 0 auto; }
  .site-footer-supporter .supporter-ico { scale: 1.5; margin-bottom: 6px; }

  /* ---- /support page ---- */
  .support-btn {
    display: inline-block; margin: 0.3rem 0 0.2rem; padding: 0.7rem 1.15rem;
    border-radius: 8px; background: linear-gradient(180deg, #7d96ff, #6478f0);
    color: #0b0d16 !important; font-weight: 600; font-size: 1.02rem;
    text-decoration: none !important;
    box-shadow: 0 2px 14px rgba(125, 150, 255, 0.3);
  }
  .support-btn:hover { filter: brightness(1.07); }
  .support-btn--soon {
    background: none; color: inherit !important; box-shadow: none; opacity: 0.8;
    border: 1px dashed rgba(125, 150, 255, 0.55); cursor: default;
  }
  .support-amounts { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.6rem 0 0.2rem; }
  .support-amount {
    display: inline-block; padding: 0.5rem 0.95rem; border-radius: 8px;
    border: 1px solid rgba(125, 150, 255, 0.55);
    background: rgba(125, 150, 255, 0.10);
    color: inherit !important; font-weight: 600; text-decoration: none !important;
  }
  .support-amount:hover { background: rgba(125, 150, 255, 0.22); }
  .support-board { display: flex; flex-wrap: wrap; gap: 1rem; margin: 1rem 0 1.25rem; }
  .support-stat {
    flex: 1 1 160px; min-width: 140px; padding: 1rem 1.1rem; text-align: center;
    border: 1px solid rgba(125, 150, 255, 0.35); border-radius: 8px;
    background: rgba(125, 150, 255, 0.10);
  }
  .support-stat-num { display: block; font-size: 1.9rem; font-weight: 700; line-height: 1.1; }
  .support-stat-label { display: block; margin-top: 0.25rem; font-size: 0.82rem; opacity: 0.8; }
  .support-recent-label { font-weight: 600; margin-bottom: 0.35rem; }
  .support-recent {
    list-style: none; margin: 0 0 0.5rem; padding: 0;
    display: flex; flex-wrap: wrap; gap: 0.4rem 0.5rem;
  }
  .support-recent li {
    display: inline-flex; align-items: center; gap: 0.4rem;
    border: 1px solid rgba(125, 150, 255, 0.35); border-radius: 999px;
    padding: 0.2rem 0.7rem; font-size: 0.85rem;
  }
  .support-tier { font-size: 0.72rem; opacity: 0.7; }
  .support-recent-note, .support-recent-empty { font-size: 0.85rem; opacity: 0.8; }

  /* ---- thin, themed scrollbars everywhere ---- */
  * { scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; }
  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--border-strong); border-radius: 6px;
    border: 2px solid transparent; background-clip: content-box;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); background-clip: content-box; }
  ::-webkit-scrollbar-corner { background: transparent; }

  /* ---- sidebar nav: flex layout (requested) ---- */
  /* the <nav> itself: a flex COLUMN (it was defaulting to row, which broke the
     layout) with a big 25px gap between its stacked regions */
  nav.site-nav { display: flex; flex-direction: column; gap: 25px; }
  /* each list stacks vertically; keep the root gap very tight */
  .site-nav .nav-list { display: flex; flex-direction: column; gap: 2px; }
  /* the LAST item of any nav list gets a big 50px gap below it, so groups
     visibly separate from whatever follows */
  .site-nav .nav-list > .nav-list-item:last-child { margin-bottom: 50px; }

  /* aowlmony "Pipeline" / "Emitters" region labels — non-clickable headers that
     just caption a run of items (injected by the script further down) */
  .site-nav .nav-region {
    list-style: none;
    margin: 1.7rem 0 0.4rem;         /* big gap ABOVE each label = the space between groups */
    padding: 0 0.75rem;
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.8rem;               /* readable — was too small next to the nav items */
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    opacity: 0.85;
    pointer-events: none;
    user-select: none;
  }
  /* the first label (Pipeline) sits just under "How this works", so it needs less
     of a gap above than the later ones */
  .site-nav .nav-region:first-of-type { margin-top: 0.9rem; }

  /* Engineering Notes sits at the very bottom of the top level — give it a big
     gap above so it clearly stands apart from the aowlmony group */
  .site-nav > .nav-list > .nav-list-item:has(> a.nav-list-link[href*="engineering-notes"]) {
    margin-top: 42px;
  }

  /* ---- sidebar nav: make the nesting levels legible (they were blending) ---- */
  /* top-level groups: bolder, a little breathing room between them */
  .site-nav > .nav-list > .nav-list-item > .nav-list-link {
    font-weight: 600 !important;
    font-size: 0.93rem;
  }
  /* root items: spacing comes ONLY from the flex `gap` above — no extra margin
     (they were stacking gap + margin into too-large a space) */
  .site-nav > .nav-list > .nav-list-item { margin-top: 0; }

  /* every nested level gets a vertical guide-rail + step-in, and gets lighter */
  .site-nav .nav-list .nav-list {
    margin-left: 0.72rem;
    padding-left: 0.15rem;
    border-left: 1px solid rgba(125, 150, 255, 0.28);
  }

  /* --- aowlmony sub-nav: SEGMENTED rail ---
     Instead of one unbroken blue line down the whole expanded group, draw the rail
     as per-item segments so the region-label gaps break it into distinct sections:
     [How this works] · Pipeline · Emitters · Ecosystem. The host <ul> is tagged by
     the label script. */
  .site-nav .nav-list .nav-region-host {
    border-left: none;            /* drop the single continuous rail on this list */
    padding-left: 0;
  }
  .site-nav .nav-region-host > .nav-list-item {
    border-left: 1px solid rgba(125, 150, 255, 0.30);
    margin: 0 !important;         /* flush, so the rail is continuous WITHIN a region */
    padding-left: 0.15rem;
  }
  /* vertical spacing lives on the link (inside the border) so items of one region
     don't gap apart and break their shared rail segment */
  .site-nav .nav-region-host > .nav-list-item > .nav-list-link {
    padding-top: 0.16rem; padding-bottom: 0.16rem;
  }
  /* the labels carry no rail — their top margin is the visible break between segments */
  .site-nav .nav-region-host > .nav-region { border-left: none; padding-left: 0.9rem; }
  .site-nav .nav-list .nav-list .nav-list-link {
    font-weight: 400 !important;
    opacity: 0.9;
  }
  /* third level (sub-sub): smaller, dimmer, fainter rail */
  .site-nav .nav-list .nav-list .nav-list { border-left-color: rgba(125, 150, 255, 0.16); }
  .site-nav .nav-list .nav-list .nav-list .nav-list-link {
    font-size: 0.82rem;
    opacity: 0.74;
  }

  /* active item: unmistakable accent (inset bar so layout doesn't shift) */
  .site-nav .nav-list-link.active {
    font-weight: 600 !important;
    color: #b7c1ff !important;
    box-shadow: inset 2px 0 0 #7d96ff;
  }
  /* the collapse chevron: a touch more visible so groups read as groups */
  .site-nav .nav-list-expander svg { opacity: 0.8; }

  /* per-item repo link: label left, repo pushed RIGHT (no dash) + external icon — injected by JS */
  .site-nav .nav-list-item.has-nav-repo { display: flex; align-items: baseline; }
  .site-nav .has-nav-repo > .nav-list-link { flex: 1 1 auto; min-width: 0; }
  .nav-repo {
    flex: 0 0 auto; margin-left: auto; padding-right: 0.55rem;
    display: inline-flex; align-items: center; gap: 0.25rem;
    font-size: 0.72rem; opacity: 0.55; color: inherit;
    text-decoration: none !important; white-space: nowrap;
  }
  .nav-repo:hover { opacity: 0.95; }
  .nav-repo svg { width: 11px; height: 11px; flex: 0 0 auto; }
  /* breathing room between nav items */
  .site-nav .nav-list .nav-list .nav-list-item { margin: 0.08rem 0; }
  /* split items have TWO <a> children — highlight the whole row, not just the label */
  .site-nav .nav-list-item.has-nav-repo:hover { background: var(--bg-elev-2); }
  .site-nav .has-nav-repo:hover > .nav-list-link { color: var(--text); }
  .site-nav .has-nav-repo:hover .nav-repo { opacity: 0.9; }
  /* selected/current split item: same full-row highlight (marked by the script) */
  .site-nav .nav-list-item.has-nav-repo.nav-repo-current { background: var(--bg-elev-2); }
  .site-nav .has-nav-repo.nav-repo-current > .nav-list-link { color: var(--text); }
  .site-nav .has-nav-repo.nav-repo-current .nav-repo { opacity: 0.9; }
  /* ACTIVE split item: the theme paints the `.active` background on the first
     <a> (the label), which is only the left half of the flex row — so the
     highlight stops mid-item. Promote it to the whole <li>, and strip the
     half-width background off the inner link. Keyed off `.active` directly so it
     holds even when the script's pathname check for `nav-repo-current` doesn't. */
  .site-nav .nav-list-item.has-nav-repo:has(> .nav-list-link.active) {
    background: var(--bg-elev-2);
    box-shadow: inset 2px 0 0 #7d96ff;
    border-radius: 0 4px 4px 0;
  }
  .site-nav .has-nav-repo > .nav-list-link.active {
    background: transparent !important;
    background-image: none !important;
    box-shadow: none !important;   /* the accent bar now lives on the row */
  }
  .site-nav .has-nav-repo:has(> .nav-list-link.active) .nav-repo { opacity: 0.9; }
</style>

<!-- split each "Label — reponame" nav item into: label (-> doc page) + a
     right-aligned repo link with an external icon (-> github.com/aoughwl/reponame).
     Leaf items only, so collapsible groups keep their chevron. -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var EXT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
      'stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
      '<path d="M14 4h6v6"/><path d="M20 4l-9 9"/>' +
      '<path d="M17 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1h5"/></svg>';
    document.querySelectorAll('.site-nav .nav-list-item').forEach(function (li) {
      if (li.querySelector(':scope > .nav-list')) return;               /* group -> keep whole */
      var link = li.querySelector(':scope > .nav-list-link');
      if (!link) return;
      var m = link.textContent.trim().match(/^(.*\S)\s+[—–-]\s+([A-Za-z0-9._-]+)$/);
      if (!m) return;
      link.textContent = m[1];
      var a = document.createElement('a');
      a.className = 'nav-repo';
      a.href = 'https://github.com/aoughwl/' + m[2];
      a.target = '_blank'; a.rel = 'noopener';
      a.title = 'aoughwl/' + m[2] + ' on GitHub';
      a.innerHTML = '<span>' + m[2] + '</span>' + EXT;
      li.appendChild(a);
      li.classList.add('has-nav-repo');
      /* full-row highlight for the current item — trust the theme's own `.active`
         first (handles index pages / trailing slashes), fall back to pathname. */
      if (link.classList.contains('active') || link.pathname === location.pathname)
        li.classList.add('nav-repo-current');
    });
  });
</script>
<!-- inject the two non-clickable region labels inside the aowlmony sub-nav:
     "Pipeline" before the Parser item, "Emitters" before the C (aowlc) item.
     Keyed off the item hrefs, so it's independent of the repo-split script. -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var linksOf = function () { return document.querySelectorAll('.site-nav .nav-list-link'); };
    function byHref(needle) {
      var links = linksOf();
      for (var i = 0; i < links.length; i++)
        if ((links[i].getAttribute('href') || '').indexOf(needle) !== -1) return links[i].closest('.nav-list-item');
      return null;
    }
    function byText(text) {
      var links = linksOf();
      for (var i = 0; i < links.length; i++)
        if ((links[i].textContent || '').trim() === text) return links[i].closest('.nav-list-item');
      return null;
    }
    function insertLabelBefore(li, text) {
      if (!li || !li.parentNode) return;
      /* tag the host list so the segmented-rail CSS applies to it */
      li.parentNode.classList.add('nav-region-host');
      var prev = li.previousElementSibling;
      if (prev && prev.classList.contains('nav-region') && prev.textContent === text) return;  /* idempotent */
      var lbl = document.createElement('li');
      lbl.className = 'nav-region';
      lbl.setAttribute('aria-hidden', 'true');
      lbl.textContent = text;
      li.parentNode.insertBefore(lbl, li);
    }
    insertLabelBefore(byHref('/docs/aowlparser'), 'Pipeline');
    insertLabelBefore(byHref('/docs/aowlc'), 'Emitters');
    insertLabelBefore(byText('Tools'), 'Ecosystem');

    /* aowlmony is the landing page — expand its group by default so the
       Pipeline / Emitters / Ecosystem sections are visible on arrival. Only
       expand if it's currently collapsed, so we never toggle it shut. */
    var topLinks = document.querySelectorAll('.site-nav > .nav-list > .nav-list-item > .nav-list-link');
    for (var t = 0; t < topLinks.length; t++) {
      if ((topLinks[t].textContent || '').trim() !== 'aowlmony') continue;
      var li = topLinks[t].closest('.nav-list-item');
      var sub = li && (li.querySelector(':scope > .nav-list'));
      var exp = li && (li.querySelector(':scope > .nav-list-expander') || li.querySelector('.nav-list-expander'));
      if (sub && exp && getComputedStyle(sub).display === 'none') exp.click();
      break;
    }
  });
</script>

<!-- AI-generated disclosure (red), shown at the top of the content. Dismissable. -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var KEY = 'aoughwl-ai-notice-dismissed:v1';
    try { if (localStorage.getItem(KEY)) return; } catch (e) {}

    var el = document.createElement('div');
    el.className = 'aoughwl-notice aoughwl-notice--ai';
    el.setAttribute('role', 'note');
    el.innerHTML =
      '<strong>Everything here is AI-generated</strong> — but tested against real ' +
      'code. Spot something off? We gladly take ' +
      '<a href="https://github.com/aoughwl/aoughwl.github.io/issues">issues on GitHub</a>.' +
      '<button class="aoughwl-notice-x" type="button" aria-label="Dismiss">×</button>';

    el.querySelector('.aoughwl-notice-x').addEventListener('click', function () {
      try { localStorage.setItem(KEY, '1'); } catch (e) {}
      el.remove();
    });

    var host = document.querySelector('.main-content-wrap') ||
               document.querySelector('#main-content') ||
               document.querySelector('.main-content') ||
               document.body;
    host.insertBefore(el, host.firstChild);
  });
</script>

<!-- mobile: a floating "open navigation" button that appears once you scroll
     past the top header, so the menu (and Home) stays one tap away. It just
     proxies just-the-docs' own #menu-button, so open/close state stays in sync. -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var menuButton = document.getElementById('menu-button');
    if (!menuButton) return;                       /* desktop layouts may omit it */
    var header = menuButton.closest('.site-header') ||
                 document.querySelector('.site-header');

    var fab = document.createElement('button');
    fab.id = 'nav-fab';
    fab.type = 'button';
    fab.setAttribute('aria-label', 'Open navigation menu');
    fab.innerHTML =
      '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" ' +
      'stroke="currentColor" stroke-width="2" stroke-linecap="round" ' +
      'aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"/></svg>';
    fab.addEventListener('click', function () { menuButton.click(); });
    document.body.appendChild(fab);

    /* Show the fab whenever the header has scrolled out of view and the nav is
       closed. An IntersectionObserver works no matter which element actually
       scrolls on mobile (window vs. an inner container); the CSS media query
       keeps it off the desktop layout entirely. */
    var headerVisible = true;
    function apply() {
      var navOpen = menuButton.classList.contains('nav-open');
      fab.classList.toggle('show', !headerVisible && !navOpen);
    }
    if (header && 'IntersectionObserver' in window) {
      new IntersectionObserver(function (entries) {
        headerVisible = entries[0].isIntersecting;
        apply();
      }, { threshold: 0 }).observe(header);
    }
    /* keep in sync when the nav is opened/closed */
    menuButton.addEventListener('click', function () { setTimeout(apply, 30); });
    apply();
  });
</script>
