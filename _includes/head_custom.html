<!-- webfonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<!-- apply saved theme before paint (no flash); dark is default -->
<script>
  (function () {
    try {
      var t = localStorage.getItem('aoughwl-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>

<!-- inject the light/dark toggle -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var btn = document.createElement('button');
    btn.id = 'theme-toggle';
    btn.type = 'button';
    btn.setAttribute('aria-label', 'Toggle light and dark theme');
    function render() {
      var dark = document.documentElement.getAttribute('data-theme') === 'dark';
      btn.textContent = dark ? '☀' : '☾';   // ☀ in dark (→light), ☾ in light (→dark)
      btn.title = dark ? 'Switch to light' : 'Switch to dark';
    }
    btn.addEventListener('click', function () {
      var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('aoughwl-theme', next); } catch (e) {}
      render();
    });
    document.body.appendChild(btn);
    render();
  });
</script>

<!-- site-wide "docs may be stale" notice (Option E). Dismissal is keyed to the
     snapshot date, so bumping DATE below re-shows it for everyone. -->
<style>
  .aoughwl-notice {
    position: relative;
    margin: 0 0 1.5rem;
    padding: 0.9rem 2.6rem 0.9rem 1rem;
    border: 1px solid rgba(125, 150, 255, 0.35);
    border-left: 3px solid #7d96ff;
    border-radius: 6px;
    background: rgba(125, 150, 255, 0.08);
    font-size: 0.85rem;
    line-height: 1.5;
  }
  .aoughwl-notice strong { font-weight: 600; }
  .aoughwl-notice .aoughwl-notice-x {
    position: absolute;
    top: 0.5rem;
    right: 0.6rem;
    border: 0;
    background: transparent;
    color: inherit;
    opacity: 0.55;
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0.2rem;
  }
  .aoughwl-notice .aoughwl-notice-x:hover { opacity: 1; }
</style>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var DATE = 'July 8, 2026';
    var KEY = 'aoughwl-stale-notice-dismissed:' + DATE;
    try { if (localStorage.getItem(KEY)) return; } catch (e) {}

    var el = document.createElement('div');
    el.className = 'aoughwl-notice';
    el.setAttribute('role', 'note');
    el.innerHTML =
      '<strong>A quick note.</strong> What you’re reading is a manual ' +
      'snapshot (' + DATE + ') and won’t always match the latest code. ' +
      'We’re building something better — docs that stay correct on ' +
      'their own, generated by aoughwl. We can’t wait to show you what ' +
      'that means.' +
      '<button class="aoughwl-notice-x" type="button" aria-label="Dismiss">×</button>';

    el.querySelector('.aoughwl-notice-x').addEventListener('click', function () {
      try { localStorage.setItem(KEY, '1'); } catch (e) {}
      el.remove();
    });

    // Prepend to the just-the-docs content column; fall back to <body>.
    var host = document.querySelector('.main-content-wrap') ||
               document.querySelector('#main-content') ||
               document.querySelector('.main-content') ||
               document.body;
    host.insertBefore(el, host.firstChild);
  });
</script>
