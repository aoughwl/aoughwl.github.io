title: aoughwl
description: >-
  Docs for the aoughwl Nimony projects — the aoughwl/nimony fork and the
  standard library, tooling, and backends built around it.
remote_theme: just-the-docs/just-the-docs
color_scheme: dark
logo: "/assets/aoughwl-logo.png"
url: "https://aoughwl.github.io"

# just-the-docs
search_enabled: true
heading_anchors: true
aux_links:
  "GitHub / aoughwl":
    - "https://github.com/aoughwl"
aux_links_new_tab: true

# nav footer
back_to_top: true
back_to_top_text: "Back to top"
footer_content: >-
  aoughwl — next-gen self-hosted platform for things n stuff.
  Reach out on Discord (timbuktu_guy) for access to the private backends.

# GitHub Pages / Jekyll
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
