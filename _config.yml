title: aoughwl
description: >-
  Docs for aoughwl — a ground-up reimplementation of the Nimony toolchain
  (AIF ≡ NIF, byte-compatible), plus its standard library, tooling, and backends.
remote_theme: just-the-docs/just-the-docs
color_scheme: dark
logo: "/assets/aoughwl-logo-white.png"
url: "https://aoughwl.github.io"

# just-the-docs
search_enabled: true
heading_anchors: true
# GitHub link lives at the bottom of the sidebar (with the external-link icon)
nav_external_links:
  - title: "GitHub · aoughwl"
    url: "https://github.com/aoughwl"
    opens_in_new_tab: true

# nav footer
back_to_top: true
back_to_top_text: "Back to top"
footer_content: >-
  aoughwl — next-gen self-hosted platform for things n stuff.
  <a href="https://discord.gg/nxa3W7w4rJ" target="_blank" rel="noopener">Contact us / Support</a>
  on Discord for access to the private backends.

# Supporter / membership program (Stripe Payment Link — no backend needed).
# To go live: paste your Stripe Payment Link (subscription) into stripe_url below.
# While stripe_url is empty the button renders as "Opening soon" (disabled), so
# nothing dead ships. Names/revenue on /support are read from _data/support.yml.
supporter:
  enabled: true
  stripe_url: ""                                   # <- paste Stripe Payment Link here
  discord_invite: "https://discord.gg/nxa3W7w4rJ"  # private supporter Discord invite
  price_display: ""                                # optional, e.g. "$10 / month"

# GitHub Pages / Jekyll
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
