title: aoughwl
description: >-
  Docs for aoughwl — a ground-up reimplementation of the Nimony toolchain
  (AIF ≡ NIF, byte-compatible), plus its standard library, tooling, and backends.
remote_theme: just-the-docs/just-the-docs
color_scheme: dark
logo: "/assets/aoughwl-logo-white.png"
url: "https://aoughwl.github.io"

# just-the-docs
search_enabled: true
heading_anchors: true
# GitHub link lives at the bottom of the sidebar (with the external-link icon)
nav_external_links:
  - title: "GitHub · aoughwl"
    url: "https://github.com/aoughwl"
    opens_in_new_tab: true

# nav footer
back_to_top: true
back_to_top_text: "Back to top"
footer_content: >-
  aoughwl — next-gen self-hosted platform for things n stuff.
  <a href="https://discord.gg/nxa3W7w4rJ" target="_blank" rel="noopener">Contact us / Support</a>
  on Discord for access to the private backends.

# Supporter / membership program (Stripe Payment Links — no backend needed).
# Model: PAY WHAT YOU WANT — supporters choose their own monthly contribution.
#
# To go live, either (or both):
#   stripe_url  – a Stripe Payment Link where the CUSTOMER PICKS THE AMOUNT.
#                 In Stripe: create a recurring Price with a customer-chosen
#                 ("custom") amount, or a Payment Link with adjustable quantity
#                 of a $1/mo unit. This is the primary "Choose your amount" button.
#   amounts     – optional preset quick-pick buttons, each its own Payment Link
#                 (fixed monthly prices always work for subscriptions).
#
# While BOTH are empty the button renders "Opening soon" (disabled), so nothing
# dead ships. Names/revenue on /support are read from _data/support.yml.
supporter:
  enabled: true
  stripe_url: "https://donate.stripe.com/3cI6oH1eJ74w9L1e3ueAg00"   # "choose your amount" Payment Link
  amounts: []                                      # e.g. - { label: "$5/mo",  url: "https://buy.stripe.com/..." }
                                                   #      - { label: "$25/mo", url: "https://buy.stripe.com/..." }
  discord_invite: "https://discord.gg/nxa3W7w4rJ"  # private supporter Discord invite

# GitHub Pages / Jekyll
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
